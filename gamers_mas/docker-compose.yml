services:
  prosody:
    image: prosodyim/prosody:13.0
    container_name: game_deal_mas_prosody
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:5222:5222"
    volumes:
      - ./infra/prosody/prosody.cfg.lua:/etc/prosody/prosody.cfg.lua:ro
      - ./scripts/bootstrap_prosody_accounts.sh:/scripts/bootstrap_prosody_accounts.sh:ro

  app:
    build: .
    container_name: game_deal_mas_app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - prosody
    volumes:
      - .:/app
    working_dir: /app
    command: ["python", "main.py"]
